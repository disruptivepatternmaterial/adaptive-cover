name: "Release"

on:
  push:
    tags:
      - "v*"
  release:
    types:
      - "published"

jobs:
  release:
    name: "Release"
    runs-on: "ubuntu-latest"
    permissions:
      contents: write
      id-token: write
    steps:
      - name: "Checkout the repository"
        uses: "actions/checkout@v4.2.1"

      - name: 🔢 Adjust version number in manifest
        shell: bash
        run: |
          # Works for both push-tag and manual-publish triggers
          if [[ "${{ github.event_name }}" == "push" ]]; then
            version="${{ github.ref_name }}"
          else
            version="${{ github.event.release.tag_name }}"
          fi
          version="${version,,}"
          version="${version#v}"
          yq e -P -o=json \
            -i ".version = \"${version}\"" \
            "${{ github.workspace }}/custom_components/adaptive_cover/manifest.json"

      - name: "ZIP the integration directory"
        shell: "bash"
        run: |
          cd "${{ github.workspace }}/custom_components/adaptive_cover"
          zip adaptive_cover.zip -r ./

      - name: "Create release and upload ZIP"
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: ${{ github.ref_name }}
          name: "${{ github.ref_name }} — Adaptive Cover (NET Fork)"
          draft: false
          prerelease: ${{ contains(github.ref_name, 'b') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
          files: ${{ github.workspace }}/custom_components/adaptive_cover/adaptive_cover.zip
