---
name-template: "v$RESOLVED_VERSION ⛅"
tag-template: "v$RESOLVED_VERSION"
change-template: "- $TITLE in (#$NUMBER) by @$AUTHOR "
sort-direction: ascending

categories:
  - title: "🚨 Breaking changes"
    labels:
      - "🚨 breaking-change"
  - title: "✨ New features"
    labels:
      - "✨ new-feature"
  - title: "🐛 Bug fixes"
    labels:
      - "🐛 bugfix"
  - title: "🚀 Enhancements"
    labels:
      - "🚀 enhancement"
      - "refactor"
      - "📈 performance"
  - title: "🧰 Maintenance"
    labels:
      - "maintenance"
      - "ci"
  - title: "📚 Documentation"
    labels:
      - "📚 documentation"
  - title: "⬆️ Dependency updates"
    labels:
      - "dependencies"

version-resolver:
  major:
    labels:
      - "major"
      - "🚨 breaking-change"
  minor:
    labels:
      - "minor"
      - "✨ new-feature"
  patch:
    labels:
      - "🐛 bugfix"
      - "chore"
      - "ci"
      - "dependencies"
      - "📚 documentation"
      - "enhancement"
      - "blueprint"
      - "📈 performance"
      - "refactor"
  default: patch

prerelease-identifier: "beta"

exclude-contributors:
  - "dependabot"

template: |
  # Adaptive Cover ⛅ v$RESOLVED_VERSION
  ## Changes

  $CHANGES

  ## THANKS TO ALL CONTRIBUTORS
  $CONTRIBUTORS
